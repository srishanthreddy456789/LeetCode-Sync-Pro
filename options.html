<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode GitHub Auto Sync Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-section">
        <h1>LeetCode GitHub Auto Sync</h1>
      </div>
      <p class="subtitle">Sync your solutions seamlessly to GitHub</p>
    </header>

    <form id="settings-form">
      <div class="form-group">
        <label for="username">GitHub Username</label>
        <input type="text" id="username" placeholder="e.g. octocat" required>
      </div>

      <div class="form-group">
        <label for="repo">Repository Name</label>
        <input type="text" id="repo" placeholder="e.g. LeetCode-Solutions" required>
      </div>

      <div class="form-group">
        <label for="token">Personal Access Token (classic or fine-grained)</label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" required>
      </div>

      <button type="submit" id="save-btn" class="btn">Save & Verify Connection</button>
    </form>

    <div id="status" class="status-message"></div>

    <div class="footer-links">
      <p>Need help creating a token? <a href="https://github.com/settings/tokens" target="_blank" rel="noopener noreferrer">Create one here</a></p>
    </div>
  </div>

  <script src="github.js"></script>
  <script src="options.js"></script>
</body>
</html>
